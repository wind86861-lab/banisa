<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Test</title>
    <style>
        .test-container {
            width: 300px;
            height: 200px;
            border: 2px solid red;
            position: relative;
            overflow: hidden;
            background: #e8f4fd;
        }
        .test-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <h1>Direct Image Test</h1>
    
    <h2>Test 1: Direct img tag</h2>
    <img src="/images/1752042615.img1.webp" width="300" style="border: 2px solid blue;">
    
    <h2>Test 2: With container (like card)</h2>
    <div class="test-container">
        <img src="/images/1752042615.img1.webp" class="test-img" alt="test">
    </div>
    
    <h2>Test 3: All fallback images</h2>
    <img src="/images/1752042615.img1.webp" width="200" style="border: 1px solid green;">
    <img src="/images/1752043509.img4.webp" width="200" style="border: 1px solid green;">
    <img src="/images/1752042615.img2.webp" width="200" style="border: 1px solid green;">
    <img src="/images/1752043693.img1.png" width="200" style="border: 1px solid green;">
    
    <script>
        document.querySelectorAll('img').forEach(img => {
            img.onload = () => console.log('✓ Loaded:', img.src);
            img.onerror = () => console.error('✗ Error:', img.src);
        });
    </script>
</body>
</html>
